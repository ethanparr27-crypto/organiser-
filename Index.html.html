<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C0D10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Triage">
<title>Triage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0C0D10; --card: #14161B; --card2: #191C22; --line: #24272F;
    --text: #E8EAEE; --mute: #8B91A0; --accent: #5B7CFA; --accent-soft: #1A2140;
    --red: #E5484D; --red-soft: #2A1517; --amber: #D9A03C; --amber-soft: #2A2214;
    --green: #30A46C; --green-soft: #12241B;
    --sora: 'Sora', system-ui, sans-serif; --mono: 'IBM Plex Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif; font-size: 15px; }
  body { min-height: 100vh; padding-bottom: calc(76px + env(safe-area-inset-bottom)); }

  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .rise { animation: rise 420ms cubic-bezier(.22,.9,.3,1) both; }
  @media (prefers-reduced-motion: reduce) { .rise { animation: none; } * { transition: none !important; } }

  header { position: sticky; top: 0; z-index: 10; background: rgba(12,13,16,0.85);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: calc(14px + env(safe-area-inset-top)) 18px 12px; }
  .brand { font-family: var(--sora); font-weight: 600; font-size: 17px; letter-spacing: -0.01em; }
  .brand span { color: var(--accent); }
  .meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .counts { font-family: var(--mono); font-size: 11px; color: var(--mute); }
  .counts b { color: var(--text); font-weight: 500; }
  .counts .crit { color: var(--red); }
  .esc { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--mute); }

  main { padding: 16px 16px 8px; max-width: 640px; margin: 0 auto; }
  h2 { font-family: var(--sora); font-size: 15px; font-weight: 600; margin: 4px 0 12px; }
  .sub { font-size: 12.5px; color: var(--mute); margin: -6px 0 14px; line-height: 1.5; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 13px 14px; margin-bottom: 9px; display: flex; gap: 12px; align-items: flex-start; }
  .card.done { opacity: 0.45; }
  .score { width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    display: grid; place-items: center; font-family: var(--sora); font-weight: 600; font-size: 15px;
    border: 1.5px solid var(--mute); color: var(--mute); }
  .score.hot { border-color: var(--red); color: var(--red); background: var(--red-soft); }
  .score.warm { border-color: var(--amber); color: var(--amber); background: var(--amber-soft); }
  .body { flex: 1; min-width: 0; }
  .title { font-size: 14.5px; font-weight: 550; line-height: 1.35; margin-bottom: 7px; }
  .done .title { text-decoration: line-through; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip { font-family: var(--mono); font-size: 10px; padding: 2.5px 7px; border-radius: 5px;
    background: var(--card2); color: var(--mute); letter-spacing: 0.03em; white-space: nowrap; }
  .chip.red { background: var(--red-soft); color: var(--red); }
  .chip.amber { background: var(--amber-soft); color: var(--amber); }
  .chip.blue { background: var(--accent-soft); color: var(--accent); }
  .actions { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
  .btn { border: 1px solid var(--line); background: var(--card2); color: var(--mute);
    border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background 140ms ease; }
  .btn.prog { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
  .btn.cleared { background: var(--green-soft); color: var(--green); border-color: transparent; }
  .btn.ghost { border: none; background: transparent; padding: 7px 8px; font-size: 15px; }
  select.btn, input.btn { appearance: none; }
  button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .empty { text-align: center; padding: 48px 20px; color: var(--mute); font-size: 13.5px;
    border: 1px dashed var(--line); border-radius: 14px; }

  .proj-head { display: flex; align-items: baseline; gap: 8px; margin: 18px 0 10px; }
  .proj-head h3 { font-family: var(--sora); font-size: 13px; font-weight: 600; margin: 0; }
  .proj-head span { font-family: var(--mono); font-size: 10px; color: var(--mute); }

  nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: rgba(12,13,16,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--line); display: flex; justify-content: space-around;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); }
  nav button { flex: 1; max-width: 140px; border: none; background: transparent; color: var(--mute);
    font-family: inherit; font-size: 11.5px; font-weight: 600; padding: 8px 4px; border-radius: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  nav button.on { color: var(--accent); background: var(--accent-soft); }
  nav .ico { font-size: 17px; line-height: 1; }

  .fab { position: fixed; right: 18px; bottom: calc(78px + env(safe-area-inset-bottom)); z-index: 11;
    width: 54px; height: 54px; border-radius: 16px; border: none; background: var(--accent);
    color: #fff; font-size: 26px; font-weight: 400; cursor: pointer;
    box-shadow: 0 8px 24px rgba(91,124,250,0.35); transition: transform 140ms ease; }
  .fab:active { transform: scale(0.94); }

  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 20;
    opacity: 0; pointer-events: none; transition: opacity 220ms ease; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 21;
    background: var(--card); border-radius: 20px 20px 0 0; border: 1px solid var(--line); border-bottom: none;
    padding: 14px 18px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(105%); transition: transform 280ms cubic-bezier(.22,.9,.3,1);
    max-width: 640px; margin: 0 auto; }
  .sheet.open { transform: none; }
  .handle { width: 36px; height: 4px; border-radius: 2px; background: var(--line); margin: 0 auto 14px; }
  .sheet h3 { font-family: var(--sora); font-size: 15px; font-weight: 600; margin: 0 0 14px; }
  .field { margin-bottom: 11px; }
  .field label { display: block; font-size: 11px; color: var(--mute); margin-bottom: 5px;
    font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .inp { width: 100%; background: var(--card2); border: 1px solid var(--line); border-radius: 10px;
    color: var(--text); padding: 11px 12px; font-size: 15px; font-family: inherit; }
  .seg { display: flex; gap: 5px; }
  .seg button { flex: 1; border: 1px solid var(--line); background: var(--card2); color: var(--mute);
    border-radius: 9px; padding: 9px 4px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .seg button.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .row2 { display: flex; gap: 9px; }
  .row2 .field { flex: 1; }
  .switchrow { display: flex; align-items: center; justify-content: space-between;
    background: var(--card2); border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px; margin-bottom: 14px; }
  .switchrow span { font-size: 13.5px; }
  .switchrow small { display: block; font-size: 11px; color: var(--mute); margin-top: 2px; }
  .primary { width: 100%; border: none; background: var(--accent); color: #fff; border-radius: 12px;
    padding: 14px; font-size: 15px; font-weight: 600; font-family: var(--sora); cursor: pointer; }

  .link { border: none; background: transparent; color: var(--mute); font-size: 12px;
    text-decoration: underline; cursor: pointer; font-family: inherit; padding: 4px; }
</style>
</head>
<body>

<header class="rise">
  <div class="brand">Triage<span>.</span></div>
  <div class="meta">
    <div class="counts" id="counts"></div>
    <label class="esc"><input type="checkbox" id="escToggle"> Auto-escalate</label>
  </div>
</header>

<main id="main"></main>

<button class="fab" id="fab" aria-label="Add task">+</button>

<nav aria-label="Pages">
  <button data-page="Queue" class="on"><span class="ico">≡</span>Queue</button>
  <button data-page="Routine"><span class="ico">↻</span>Routine</button>
  <button data-page="Projects"><span class="ico">▦</span>Projects</button>
</nav>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="Add task">
  <div class="handle"></div>
  <h3>Log a task</h3>
  <div class="field">
    <label for="fTitle">Task</label>
    <input class="inp" id="fTitle" placeholder="What needs doing?">
  </div>
  <div class="field">
    <label>Priority</label>
    <div class="seg" id="fPriority"></div>
  </div>
  <div class="row2">
    <div class="field">
      <label for="fSen">Requested by</label>
      <select class="inp" id="fSen"></select>
    </div>
    <div class="field">
      <label for="fProj">Project</label>
      <input class="inp" id="fProj" placeholder="General">
    </div>
  </div>
  <div class="field" id="dueField">
    <label for="fDue">Deadline</label>
    <input class="inp" id="fDue" type="date">
  </div>
  <div class="switchrow">
    <div><span>Routine task</span><small>Appears in the queue automatically every day</small></div>
    <input type="checkbox" id="fRoutine">
  </div>
  <button class="primary" id="fAdd">Add to queue</button>
</div>

<script>
/* ============ Constants ============ */
const PRIORITIES = [
  { key: "P1", label: "Critical", w: 40 },
  { key: "P2", label: "High", w: 28 },
  { key: "P3", label: "Medium", w: 16 },
  { key: "P4", label: "Low", w: 8 },
];
const SENIORITY = [
  { key: "Self", w: 3 }, { key: "Manager", w: 8 },
  { key: "Director", w: 14 }, { key: "Partner", w: 20 },
];
const STATUSES = ["Open", "In progress", "Cleared"];
const KEY = "triage:mobile:v1";
const uid = () => Math.random().toString(36).slice(2, 8).toUpperCase();
const todayKey = () => new Date().toISOString().slice(0, 10);
const DAY = 8.64e7;

/* ============ Storage (localStorage w/ memory fallback) ============ */
let memFallback = null;
function loadState() {
  try { const raw = localStorage.getItem(KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return memFallback;
}
function saveState(s) {
  memFallback = s;
  try { localStorage.setItem(KEY, JSON.stringify(s)); } catch (e) {}
}

/* ============ Seed ============ */
function seed() {
  const iso = (o) => { const d = new Date(); d.setDate(d.getDate() + o); return d.toISOString().slice(0, 10); };
  return {
    autoEsc: true, lastSpawn: null,
    routines: [
      { id: uid(), title: "Morning cash & position reconciliation", priority: "P1", seniority: "Manager", project: "Daily P&L", active: true },
      { id: uid(), title: "EOD P&L sign-off pack", priority: "P2", seniority: "Director", project: "Daily P&L", active: true },
    ],
    tasks: [
      { id: uid(), title: "Chase 2 unconfirmed CDS trades", priority: "P1", seniority: "Manager", project: "Trade support", status: "Open", due: iso(0), created: Date.now() - 2 * DAY },
      { id: uid(), title: "Price verification — variance swap book", priority: "P2", seniority: "Director", project: "Pricing", status: "Open", due: iso(1), created: Date.now() - DAY },
      { id: uid(), title: "Document new P&L check procedure", priority: "P3", seniority: "Self", project: "Process notes", status: "Open", due: iso(4), created: Date.now() - 5 * DAY },
    ],
  };
}

/* ============ Scoring ============ */
function urgencyW(due, status) {
  if (!due || status === "Cleared") return 0;
  const ms = new Date(due + "T17:00:00") - Date.now();
  if (ms < 0) return 30;
  const d = ms / DAY;
  if (d <= 1) return 24;
  if (d <= 2) return 16;
  if (d <= 5) return 8;
  return 2;
}
function effPriority(t, autoEsc) {
  if (!autoEsc || !t.due || t.status === "Cleared") return { key: t.priority, esc: false };
  const ms = new Date(t.due + "T17:00:00") - Date.now();
  if (ms <= DAY && t.priority !== "P1") {
    const i = PRIORITIES.findIndex((p) => p.key === t.priority);
    return { key: PRIORITIES[Math.max(0, i - 1)].key, esc: true };
  }
  return { key: t.priority, esc: false };
}
function score(t, autoEsc) {
  const e = effPriority(t, autoEsc);
  const pw = PRIORITIES.find((p) => p.key === e.key).w;
  const sw = (SENIORITY.find((s) => s.key === (t.seniority || "Self")) || SENIORITY[0]).w;
  return Math.min(100, Math.round(((pw + sw + urgencyW(t.due, t.status)) / 90) * 100));
}
function pendingDays(c) { return Math.floor((Date.now() - c) / DAY); }
function dueChip(due, status) {
  if (!due || status === "Cleared") return null;
  const ms = new Date(due + "T17:00:00") - Date.now();
  if (ms < 0) return { label: "OVERDUE " + Math.max(1, Math.floor(-ms / DAY)) + "d", cls: "red" };
  if (ms / DAY <= 1) return { label: "DUE TODAY", cls: "amber" };
  return { label: "T+" + Math.ceil(ms / DAY), cls: "" };
}

/* ============ State + routine spawning ============ */
let state = loadState() || seed();
(function spawn() {
  const tk = todayKey();
  if (state.lastSpawn === tk) return;
  const existing = new Set(state.tasks.filter((t) => t.due === tk && t.routineId).map((t) => t.routineId));
  const fresh = state.routines.filter((r) => r.active && !existing.has(r.id)).map((r) => ({
    id: uid(), title: r.title, priority: r.priority, seniority: r.seniority,
    project: r.project || "Routine", status: "Open", due: tk, created: Date.now(), routineId: r.id,
  }));
  state.tasks = fresh.concat(state.tasks);
  state.lastSpawn = tk;
  saveState(state);
})();

let page = "Queue";
let showCleared = false;

/* ============ Rendering ============ */
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function chipHTML(label, cls) { return '<span class="chip ' + (cls || "") + '">' + esc(label) + "</span>"; }

function cardHTML(t, i) {
  const e = effPriority(t, state.autoEsc);
  const p = PRIORITIES.find((x) => x.key === e.key);
  const sc = score(t, state.autoEsc);
  const scCls = sc >= 70 ? "hot" : sc >= 45 ? "warm" : "";
  const d = dueChip(t.due, t.status);
  const pend = pendingDays(t.created);
  const done = t.status === "Cleared";
  const stCls = done ? "cleared" : t.status === "In progress" ? "prog" : "";
  const priOpts = PRIORITIES.map((x) => '<option value="' + x.key + '"' + (x.key === t.priority ? " selected" : "") + ">" + x.label + "</option>").join("");
  return '<div class="card rise ' + (done ? "done" : "") + '" style="animation-delay:' + (60 + i * 40) + 'ms">' +
    '<div class="score ' + scCls + '">' + sc + "</div>" +
    '<div class="body">' +
      '<div class="title">' + esc(t.title) + "</div>" +
      '<div class="chips">' +
        chipHTML(p.label + (e.esc ? " ↑" : "")) +
        (d ? chipHTML(d.label, d.cls) : "") +
        chipHTML("pending " + pend + "d", pend >= 5 ? "amber" : "") +
        chipHTML(t.seniority || "Self") +
        (t.routineId ? chipHTML("routine", "blue") : "") +
        chipHTML(t.project || "General") +
      "</div>" +
      '<div class="actions">' +
        '<button class="btn ' + stCls + '" data-act="cycle" data-id="' + t.id + '">' + t.status + "</button>" +
        '<select class="btn" data-act="pri" data-id="' + t.id + '">' + priOpts + "</select>" +
        '<input class="btn" style="width:130px" type="date" value="' + (t.due || "") + '" data-act="due" data-id="' + t.id + '" aria-label="Deadline">' +
        '<button class="btn ghost" data-act="del" data-id="' + t.id + '" aria-label="Delete">×</button>' +
      "</div>" +
    "</div></div>";
}

function render() {
  const scored = state.tasks.map((t) => Object.assign({}, t, { _s: score(t, state.autoEsc) }))
    .sort((a, b) => ((a.status === "Cleared") - (b.status === "Cleared")) || (b._s - a._s));
  const active = scored.filter((t) => t.status !== "Cleared");
  const clearedT = scored.filter((t) => t.status === "Cleared");
  const crit = active.filter((t) => effPriority(t, state.autoEsc).key === "P1").length;

  document.getElementById("counts").innerHTML =
    "<b>" + active.length + "</b> open · <b class='crit'>" + crit + "</b> critical · <b>" + clearedT.length + "</b> cleared";
  document.getElementById("escToggle").checked = !!state.autoEsc;

  const m = document.getElementById("main");
  if (page === "Queue") {
    let html = '<h2>Priority queue</h2>';
    html += active.length ? active.map(cardHTML).join("") : '<div class="empty">Queue clear. Tap + to log a task.</div>';
    if (clearedT.length) {
      html += '<button class="link" id="toggleCleared">' + (showCleared ? "Hide cleared" : "Show cleared (" + clearedT.length + ")") + "</button>";
      if (showCleared) html += clearedT.map((t, i) => cardHTML(t, active.length + i)).join("");
    }
    m.innerHTML = html;
    const tc = document.getElementById("toggleCleared");
    if (tc) tc.onclick = () => { showCleared = !showCleared; render(); };
  } else if (page === "Routine") {
    let html = '<h2>Routine tasks</h2><p class="sub">Active routines drop into the queue automatically each day. Use the + button and switch on "Routine task" to add one.</p>';
    html += state.routines.length ? state.routines.map((r, i) => {
      const p = PRIORITIES.find((x) => x.key === r.priority);
      return '<div class="card rise" style="animation-delay:' + (60 + i * 40) + 'ms;opacity:' + (r.active ? 1 : 0.45) + '">' +
        '<div class="body"><div class="title">' + esc(r.title) + '</div>' +
        '<div class="chips">' + chipHTML(p.label) + chipHTML(r.seniority) + chipHTML(r.project || "Routine") + "</div>" +
        '<div class="actions">' +
          '<button class="btn ' + (r.active ? "cleared" : "") + '" data-act="rtoggle" data-id="' + r.id + '">' + (r.active ? "Active" : "Paused") + "</button>" +
          '<button class="btn ghost" data-act="rdel" data-id="' + r.id + '" aria-label="Delete routine">×</button>' +
        "</div></div></div>";
    }).join("") : '<div class="empty">No routines yet.</div>';
    m.innerHTML = html;
  } else {
    const projects = [...new Set(active.map((t) => t.project || "General"))];
    let html = '<h2>Projects</h2>';
    html += projects.length ? projects.map((pr) => {
      const items = active.filter((t) => (t.project || "General") === pr);
      return '<div class="proj-head"><h3>' + esc(pr) + "</h3><span>" + items.length + " open</span></div>" + items.map(cardHTML).join("");
    }).join("") : '<div class="empty">No open tasks yet.</div>';
    m.innerHTML = html;
  }
}

/* ============ Actions (event delegation) ============ */
function patch(fn) { fn(state); saveState(state); render(); }

document.getElementById("main").addEventListener("click", (ev) => {
  const el = ev.target.closest("[data-act]");
  if (!el) return;
  const id = el.dataset.id, act = el.dataset.act;
  if (act === "cycle") patch((s) => { s.tasks = s.tasks.map((t) => t.id === id ? Object.assign({}, t, { status: STATUSES[(STATUSES.indexOf(t.status) + 1) % 3] }) : t); });
  if (act === "del") patch((s) => { s.tasks = s.tasks.filter((t) => t.id !== id); });
  if (act === "rtoggle") patch((s) => { s.routines = s.routines.map((r) => r.id === id ? Object.assign({}, r, { active: !r.active }) : r); });
  if (act === "rdel") patch((s) => { s.routines = s.routines.filter((r) => r.id !== id); });
});
document.getElementById("main").addEventListener("change", (ev) => {
  const el = ev.target.closest("[data-act]");
  if (!el) return;
  const id = el.dataset.id;
  if (el.dataset.act === "pri") patch((s) => { s.tasks = s.tasks.map((t) => t.id === id ? Object.assign({}, t, { priority: el.value }) : t); });
  if (el.dataset.act === "due") patch((s) => { s.tasks = s.tasks.map((t) => t.id === id ? Object.assign({}, t, { due: el.value || null }) : t); });
});

document.getElementById("escToggle").addEventListener("change", (ev) => {
  patch((s) => { s.autoEsc = ev.target.checked; });
});

document.querySelectorAll("nav [data-page]").forEach((b) => {
  b.addEventListener("click", () => {
    page = b.dataset.page;
    document.querySelectorAll("nav [data-page]").forEach((x) => x.classList.toggle("on", x === b));
    render();
  });
});

/* ============ Bottom sheet ============ */
let fPri = "P3";
const priSeg = document.getElementById("fPriority");
priSeg.innerHTML = PRIORITIES.map((p) => '<button type="button" data-p="' + p.key + '"' + (p.key === fPri ? ' class="on"' : "") + ">" + p.label + "</button>").join("");
priSeg.addEventListener("click", (ev) => {
  const b = ev.target.closest("[data-p]");
  if (!b) return;
  fPri = b.dataset.p;
  priSeg.querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b));
});
document.getElementById("fSen").innerHTML = SENIORITY.map((s) => '<option value="' + s.key + '">' + s.key + "</option>").join("");

const sheet = document.getElementById("sheet"), scrim = document.getElementById("scrim");
function openSheet() { sheet.classList.add("open"); scrim.classList.add("open"); setTimeout(() => document.getElementById("fTitle").focus(), 300); }
function closeSheet() { sheet.classList.remove("open"); scrim.classList.remove("open"); }
document.getElementById("fab").addEventListener("click", openSheet);
scrim.addEventListener("click", closeSheet);
document.getElementById("fRoutine").addEventListener("change", (ev) => {
  document.getElementById("dueField").style.display = ev.target.checked ? "none" : "";
});

document.getElementById("fAdd").addEventListener("click", () => {
  const title = document.getElementById("fTitle").value.trim();
  if (!title) { document.getElementById("fTitle").focus(); return; }
  const sen = document.getElementById("fSen").value;
  const proj = document.getElementById("fProj").value.trim();
  const due = document.getElementById("fDue").value;
  const isRoutine = document.getElementById("fRoutine").checked;
  patch((s) => {
    if (isRoutine) {
      const r = { id: uid(), title, priority: fPri, seniority: sen, project: proj || "Routine", active: true };
      s.routines.unshift(r);
      s.tasks.unshift({ id: uid(), title, priority: fPri, seniority: sen, project: r.project, status: "Open", due: todayKey(), created: Date.now(), routineId: r.id });
    } else {
      s.tasks.unshift({ id: uid(), title, priority: fPri, seniority: sen, project: proj || "General", status: "Open", due: due || null, created: Date.now() });
    }
  });
  document.getElementById("fTitle").value = "";
  document.getElementById("fDue").value = "";
  document.getElementById("fRoutine").checked = false;
  document.getElementById("dueField").style.display = "";
  closeSheet();
});

render();
</script>
</body>
</html>
